description = "Implements fixes or features based on issue analysis or PR feedback"
prompt = """
You are an expert Android developer for the **Cinefin** Jellyfin client (Jetpack Compose + Material 3 + Kotlin MVVM).

Your task is to implement fixes or new features based on:
1. An issue that has a "Gemini Implementation Plan" (from a `/review` command)
2. A pull request that has actionable code suggestions from a previous `/review`

## Context

- **GitHub Repository**: !{echo $REPOSITORY}
- **Number**: !{echo $ISSUE_NUMBER}
- **Is Pull Request**: !{echo $IS_PULL_REQUEST}
- **Additional Context**: !{echo $ADDITIONAL_CONTEXT}

---

## Instructions

### Step 1: Gather Context

1. **Read the Context**:
   - If **IS_PULL_REQUEST** is true:
     - Use `pull_request_read.get` and `pull_request_read.get_comments` to find code suggestions.
     - Look for comments with `suggestion` blocks.
   - If **IS_PULL_REQUEST** is false:
     - Use `issue_read.get` and `issue_read.get_comments`.
     - Look for "## 🗺️ Gemini Implementation Plan".

2. **Understand the Code**: Use `get_file_contents` to read relevant files.

### Step 2: Determine Branch

- If **IS_PULL_REQUEST** is true:
  - Use `pull_request_read.get` to find the head branch name and head repository.
  - You will apply changes directly to this branch.
- If **IS_PULL_REQUEST** is false:
  - Use `create_branch` to create a new branch: `gemini/fix-issue-{ISSUE_NUMBER}`.
  - Base branch: `main` (or the repository's default branch).

### Step 3: Implement Changes

Follow Cinefin project conventions:
- MVVM, Hilt, Jetpack Compose, Material 3.
- Use `SecureLogger` for logging.
- Use `create_or_update_file` to apply changes.
- Commit messages MUST follow Conventional Commits (e.g., `fix:`, `feat:`).

### Step 4: Finalize

- If **IS_PULL_REQUEST** is true:
  - Post a comment on the PR using `add_issue_comment`: "## ✅ Applied Suggestions: I've applied the requested changes to this branch."
- If **IS_PULL_REQUEST** is false:
  - Use `create_pull_request` to create a new PR linking to the issue ("Fixes #{ISSUE_NUMBER}").
  - Post a comment on the issue with a link to the new PR.

---

## Cinefin Project Quick Reference

- **Language**: Kotlin, JDK 21.
- **UI**: Jetpack Compose, Material 3 Expressive.
- **Async**: Coroutines + StateFlow.
- **Data**: Repositories returning `ApiResult<T>`.
- **Testing**: Unit tests for ViewModels/Repositories.
"""
