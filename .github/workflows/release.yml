name: Build and Release Cinefin

# ─────────────────────────────────────────────────────────────
# Triggers
#   issue_comment  →  /build              (test build, no release)
#                     /release            (patch bump + release)
#                     /release major      (major bump + release)
#                     /release 15.0       (explicit version + release)
#   workflow_dispatch → manual trigger from CLI or GitHub UI
# ─────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: false
        default: 'build'
        type: choice
        options: [build, release]
      bump_type:
        description: 'Version bump type (release only)'
        required: false
        default: 'patch'
        type: choice
        options: [patch, major]
      custom_version:
        description: 'Override versionName (e.g. 15.0). Overrides bump_type if set.'
        required: false
        default: ''
  issue_comment:
    types: [created]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: parse the trigger, validate auth, post ACK
  # ─────────────────────────────────────────────────────────────
  check-trigger:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      should_run:     ${{ steps.check.outputs.should_run }}
      command:        ${{ steps.check.outputs.command }}
      bump_type:      ${{ steps.check.outputs.bump_type }}
      custom_version: ${{ steps.check.outputs.custom_version }}
      issue_number:   ${{ steps.check.outputs.issue_number }}

    steps:
      - name: Validate trigger and parse inputs
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // ── workflow_dispatch ────────────────────────────────
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_run',     'true');
              core.setOutput('command',        context.payload.inputs.command        || 'build');
              core.setOutput('bump_type',      context.payload.inputs.bump_type      || 'patch');
              core.setOutput('custom_version', context.payload.inputs.custom_version || '');
              core.setOutput('issue_number',   '');
              return;
            }

            // ── issue_comment ────────────────────────────────────
            if (context.eventName === 'issue_comment') {
              const body = context.payload.comment.body.trim();

              // Ignore anything that isn't /build or /release
              if (!body.startsWith('/build') && !body.startsWith('/release')) {
                core.setOutput('should_run', 'false');
                return;
              }

              // Check the commenter has write/maintain/admin on this repo
              let permission = 'none';
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner:    context.repo.owner,
                  repo:     context.repo.repo,
                  username: context.payload.comment.user.login,
                });
                permission = data.permission;
              } catch (_) { /* non-collaborator → permission stays 'none' */ }

              if (!['admin', 'maintain', 'write'].includes(permission)) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: `❌ @${context.payload.comment.user.login} — write access is required to trigger builds.`,
                });
                core.setOutput('should_run', 'false');
                return;
              }

              const parts   = body.split(/\s+/);
              const command = parts[0] === '/release' ? 'release' : 'build';
              const arg     = parts[1] || '';

              let bumpType      = 'patch';
              let customVersion = '';

              if (command === 'release') {
                if (['patch', 'major'].includes(arg)) {
                  bumpType = arg;
                } else if (arg) {
                  customVersion = arg;
                }

                // Reject malformed custom versions before triggering anything
                if (customVersion && !/^[0-9]+(\.[0-9]+){1,2}$/.test(customVersion)) {
                  await github.rest.issues.createComment({
                    owner:        context.repo.owner,
                    repo:         context.repo.repo,
                    issue_number: context.payload.issue.number,
                    body: `❌ Invalid version \`${customVersion}\`. Use a numeric format like \`14.72\` or \`15.0\`.`,
                  });
                  core.setOutput('should_run', 'false');
                  return;
                }
              }

              // ACK with a reaction on the triggering comment
              const reaction = command === 'release' ? 'rocket' : 'eyes';
              await github.rest.reactions.createForIssueComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: context.payload.comment.id,
                content:    reaction,
              });

              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const bumpLine = command === 'release'
                ? `| Bump | \`${customVersion || bumpType}\` |`
                : null;
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.issue.number,
                body: [
                  `🔨 **${command === 'release' ? 'Release' : 'Test'} build** triggered by @${context.payload.comment.user.login}`,
                  ``,
                  `| | |`,
                  `|---|---|`,
                  `| Command | \`${parts[0]}\` |`,
                  bumpLine,
                  `| Run | [View workflow](${runUrl}) |`,
                ].filter(Boolean).join('\n'),
              });

              core.setOutput('should_run',     'true');
              core.setOutput('command',        command);
              core.setOutput('bump_type',      bumpType);
              core.setOutput('custom_version', customVersion);
              core.setOutput('issue_number',   String(context.payload.issue.number));
            }

  # ─────────────────────────────────────────────────────────────
  # Job 2: build the signed AAB (runs for both /build and /release)
  # Reports success or failure back to the issue.
  # ─────────────────────────────────────────────────────────────
  build:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Add Android SDK tools to PATH
        run: echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;35.0.0"   \
            "platform-tools"

      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.JELLYFIN_RELEASE_KEYSTORE_B64 }}" \
            | base64 --decode > "$RUNNER_TEMP/cinefin-release.keystore"

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" \
            | base64 --decode > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release AAB
        id: gradle_build
        continue-on-error: true
        run: |
          ./gradlew --no-daemon :app:bundleRelease 2>&1 | tee "$RUNNER_TEMP/build.log"
          exit ${PIPESTATUS[0]}
        env:
          JELLYFIN_KEYSTORE_FILE:     ${{ runner.temp }}/cinefin-release.keystore
          JELLYFIN_KEYSTORE_PASSWORD: ${{ secrets.JELLYFIN_KEYSTORE_PASSWORD }}
          JELLYFIN_KEY_ALIAS:         ${{ secrets.JELLYFIN_KEY_ALIAS }}
          JELLYFIN_KEY_PASSWORD:      ${{ secrets.JELLYFIN_KEY_PASSWORD }}
          GOOGLE_AI_API_KEY:          ${{ secrets.GOOGLE_AI_API_KEY }}

      # ── Post failure comment ───────────────────────────────────
      - name: Post build failure to issue
        if: steps.gradle_build.outcome == 'failure' && needs.check-trigger.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs    = require('fs');
            const log   = fs.readFileSync(process.env.RUNNER_TEMP + '/build.log', 'utf8');
            const lines = log.split('\n');

            // Extract from the BUILD FAILED banner backwards for context
            const failureIdx = lines.findIndex(l => l.includes('BUILD FAILED'));
            const relevant   = failureIdx >= 0
              ? lines.slice(Math.max(0, failureIdx - 40))
              : lines.slice(-60);

            const snippet = relevant.join('\n').trim();
            const runUrl  = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              body: [
                `❌ **Build failed** — [full log](${runUrl})`,
                ``,
                `<details><summary>Build output</summary>`,
                ``,
                `\`\`\``,
                snippet.slice(-12000),
                `\`\`\``,
                `</details>`,
              ].join('\n'),
            });

      # Propagate the real failure after the comment is posted
      - name: Fail job on build error
        if: steps.gradle_build.outcome == 'failure'
        run: exit 1

      # ── Post /build success (not for /release — publish handles that) ──
      - name: Post build success to issue
        if: >
          steps.gradle_build.outcome == 'success' &&
          needs.check-trigger.outputs.command == 'build' &&
          needs.check-trigger.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              body: [
                `✅ **Build succeeded!** Ready to release whenever you are.`,
                ``,
                `| | |`,
                `|---|---|`,
                `| AAB | Built and signed successfully |`,
                `| Log | [View run](${runUrl}) |`,
                ``,
                `Run \`/release\` to publish this version.`,
              ].join('\n'),
            });

  # ─────────────────────────────────────────────────────────────
  # Job 3: version bump, tag, GitHub release (release only)
  # Only runs after build succeeds.
  # ─────────────────────────────────────────────────────────────
  publish:
    needs: [check-trigger, build]
    if: >
      needs.check-trigger.outputs.should_run == 'true' &&
      needs.check-trigger.outputs.command == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Add Android SDK tools to PATH
        run: echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;35.0.0"   \
            "platform-tools"

      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.JELLYFIN_RELEASE_KEYSTORE_B64 }}" \
            | base64 --decode > "$RUNNER_TEMP/cinefin-release.keystore"

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" \
            | base64 --decode > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Version bump ───────────────────────────────────────────
      - name: Bump versionCode and versionName
        id: version
        run: |
          GRADLE="app/build.gradle.kts"

          OLD_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$GRADLE")
          OLD_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$GRADLE")
          NEW_CODE=$(( OLD_CODE + 1 ))

          CUSTOM_VERSION="${{ needs.check-trigger.outputs.custom_version }}"
          BUMP_TYPE="${{ needs.check-trigger.outputs.bump_type }}"

          if [ -n "$CUSTOM_VERSION" ]; then
            NEW_NAME="$CUSTOM_VERSION"
          else
            MAJOR=$(echo "$OLD_NAME" | cut -d. -f1)
            MINOR=$(echo "$OLD_NAME" | cut -d. -f2)
            case "$BUMP_TYPE" in
              major) NEW_NAME="$(( MAJOR + 1 )).0" ;;
              patch|*) NEW_NAME="${MAJOR}.$(( MINOR + 1 ))" ;;
            esac
          fi

          sed -i "s/versionCode = ${OLD_CODE}/versionCode = ${NEW_CODE}/" "$GRADLE"
          sed -i "s/versionName = \"${OLD_NAME}\"/versionName = \"${NEW_NAME}\"/" "$GRADLE"

          VERIFY_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$GRADLE")
          VERIFY_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$GRADLE")
          if [ "$VERIFY_CODE" != "$NEW_CODE" ] || [ "$VERIFY_NAME" != "$NEW_NAME" ]; then
            echo "❌ Version patch failed — aborting"
            exit 1
          fi

          echo "✅ ${OLD_NAME} (${OLD_CODE}) → ${NEW_NAME} (${NEW_CODE})"
          {
            echo "old_code=${OLD_CODE}"
            echo "old_name=${OLD_NAME}"
            echo "new_code=${NEW_CODE}"
            echo "new_name=${NEW_NAME}"
            echo "tag=v${NEW_NAME}"
          } >> "$GITHUB_OUTPUT"

      # ── Build again with bumped version numbers ────────────────
      - name: Build signed release AAB
        run: ./gradlew --no-daemon :app:bundleRelease
        env:
          JELLYFIN_KEYSTORE_FILE:     ${{ runner.temp }}/cinefin-release.keystore
          JELLYFIN_KEYSTORE_PASSWORD: ${{ secrets.JELLYFIN_KEYSTORE_PASSWORD }}
          JELLYFIN_KEY_ALIAS:         ${{ secrets.JELLYFIN_KEY_ALIAS }}
          JELLYFIN_KEY_PASSWORD:      ${{ secrets.JELLYFIN_KEY_PASSWORD }}
          GOOGLE_AI_API_KEY:          ${{ secrets.GOOGLE_AI_API_KEY }}

      # ── Commit + tag + push ────────────────────────────────────
      - name: Commit version bump and push tag
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_name }} (${{ steps.version.outputs.new_code }})"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name:     "Cinefin ${{ steps.version.outputs.new_name }}"
          files:    app/build/outputs/bundle/release/app-release.aab
          draft:    false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Cinefin ${{ steps.version.outputs.new_name }}

            | | |
            |---|---|
            | versionName | `${{ steps.version.outputs.new_name }}` |
            | versionCode | `${{ steps.version.outputs.new_code }}` |

            ### Play Store upload
            Download **`app-release.aab`** from the assets below and upload it in
            [Google Play Console → Releases](https://play.google.com/console) to submit the update.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Completion comment ─────────────────────────────────────
      - name: Post release complete to issue
        if: needs.check-trigger.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const releaseUrl = '${{ steps.create_release.outputs.url }}';
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              body: [
                `✅ **Release complete!**`,
                ``,
                `| | |`,
                `|---|---|`,
                `| Version | \`${{ steps.version.outputs.new_name }}\` (code \`${{ steps.version.outputs.new_code }}\`) |`,
                `| Tag | [\`${{ steps.version.outputs.tag }}\`](${releaseUrl}) |`,
                ``,
                `Download the signed \`.aab\` from the release and upload to Google Play Console.`,
              ].join('\n'),
            });
