name: Build and Release Cinefin

# ─────────────────────────────────────────────────────────────
# Triggers
#   1. workflow_dispatch  →  gh workflow run release.yml [--field bump_type=major]
#   2. issue_comment      →  /release [patch|major|<custom>]  in any issue
# ─────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (patch increments X.N→X.N+1; major increments N.x→N+1.0)'
        required: false
        default: 'patch'
        type: choice
        options: [patch, major]
      custom_version:
        description: 'Override versionName entirely (e.g. 15.0). Overrides bump_type if set.'
        required: false
        default: ''
  issue_comment:
    types: [created]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: validate the trigger, parse args, post ACK
  # ─────────────────────────────────────────────────────────────
  check-trigger:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      should_run:     ${{ steps.check.outputs.should_run }}
      bump_type:      ${{ steps.check.outputs.bump_type }}
      custom_version: ${{ steps.check.outputs.custom_version }}
      issue_number:   ${{ steps.check.outputs.issue_number }}

    steps:
      - name: Validate trigger and parse inputs
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // ── workflow_dispatch ────────────────────────────────
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_run',     'true');
              core.setOutput('bump_type',      context.payload.inputs.bump_type      || 'patch');
              core.setOutput('custom_version', context.payload.inputs.custom_version || '');
              core.setOutput('issue_number',   '');
              return;
            }

            // ── issue_comment ────────────────────────────────────
            if (context.eventName === 'issue_comment') {
              const body = context.payload.comment.body.trim();

              // Ignore anything that isn't a /release command
              if (!body.startsWith('/release')) {
                core.setOutput('should_run', 'false');
                return;
              }

              // Check the commenter has write/admin on this repo
              let permission = 'none';
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner:    context.repo.owner,
                  repo:     context.repo.repo,
                  username: context.payload.comment.user.login,
                });
                permission = data.permission;
              } catch (_) { /* non-collaborator → permission stays 'none' */ }

              if (!['admin', 'maintain', 'write'].includes(permission)) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: `❌ @${context.payload.comment.user.login} — write access is required to trigger a release.`,
                });
                core.setOutput('should_run', 'false');
                return;
              }

              // Parse: /release [patch|major|<custom_version>]
              const parts       = body.split(/\s+/);
              const arg         = parts[1] || '';
              let   bumpType     = 'patch';
              let   customVersion = '';

              if (['patch', 'major'].includes(arg)) {
                bumpType = arg;
              } else if (arg) {
                customVersion = arg;  // treat as explicit version string
              }

              // Reject malformed custom versions before triggering anything
              if (customVersion && !/^[0-9]+(\.[0-9]+){1,2}$/.test(customVersion)) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: `❌ Invalid version \`${customVersion}\`. Use a numeric format like \`14.72\` or \`15.0\`.`,
                });
                core.setOutput('should_run', 'false');
                return;
              }

              // ACK with a 🚀 reaction on the triggering comment
              await github.rest.reactions.createForIssueComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: context.payload.comment.id,
                content:    'rocket',
              });

              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.issue.number,
                body: [
                  `🚀 Release build triggered by @${context.payload.comment.user.login}`,
                  ``,
                  `| | |`,
                  `|---|---|`,
                  `| Bump | \`${customVersion || bumpType}\` |`,
                  `| Run  | [View workflow](${runUrl}) |`,
                ].join('\n'),
              });

              core.setOutput('should_run',     'true');
              core.setOutput('bump_type',      bumpType);
              core.setOutput('custom_version', customVersion);
              core.setOutput('issue_number',   String(context.payload.issue.number));
            }

  # ─────────────────────────────────────────────────────────────
  # Job 2: bump version, build signed AAB, tag, release
  # ─────────────────────────────────────────────────────────────
  release:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT if you need to push the version-bump commit back to a
          # protected main branch; GITHUB_TOKEN works for unprotected branches.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Java / Gradle ──────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── Android SDK ────────────────────────────────────────────
      - name: Add Android SDK tools to PATH
        run: echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;35.0.0"   \
            "platform-tools"

      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── Secrets ────────────────────────────────────────────────
      - name: Decode signing keystore
        run: |
          echo "${{ secrets.JELLYFIN_RELEASE_KEYSTORE_B64 }}" \
            | base64 --decode > "$RUNNER_TEMP/cinefin-release.keystore"

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" \
            | base64 --decode > app/google-services.json

      # ── Version bump ───────────────────────────────────────────
      - name: Bump versionCode and versionName
        id: version
        run: |
          GRADLE="app/build.gradle.kts"

          # Read current values
          OLD_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$GRADLE")
          OLD_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$GRADLE")

          NEW_CODE=$(( OLD_CODE + 1 ))

          CUSTOM_VERSION="${{ needs.check-trigger.outputs.custom_version }}"
          BUMP_TYPE="${{ needs.check-trigger.outputs.bump_type }}"

          if [ -n "$CUSTOM_VERSION" ]; then
            NEW_NAME="$CUSTOM_VERSION"
          else
            MAJOR=$(echo "$OLD_NAME" | cut -d. -f1)
            MINOR=$(echo "$OLD_NAME" | cut -d. -f2)
            case "$BUMP_TYPE" in
              major) NEW_NAME="$(( MAJOR + 1 )).0" ;;
              patch|*) NEW_NAME="${MAJOR}.$(( MINOR + 1 ))" ;;
            esac
          fi

          # Patch the gradle file in-place
          sed -i "s/versionCode = ${OLD_CODE}/versionCode = ${NEW_CODE}/" "$GRADLE"
          sed -i "s/versionName = \"${OLD_NAME}\"/versionName = \"${NEW_NAME}\"/" "$GRADLE"

          # Verify the changes landed correctly
          VERIFY_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$GRADLE")
          VERIFY_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$GRADLE")
          if [ "$VERIFY_CODE" != "$NEW_CODE" ] || [ "$VERIFY_NAME" != "$NEW_NAME" ]; then
            echo "❌ Version patch failed — aborting"
            exit 1
          fi

          echo "✅ ${OLD_NAME} (${OLD_CODE}) → ${NEW_NAME} (${NEW_CODE})"

          {
            echo "old_code=${OLD_CODE}"
            echo "old_name=${OLD_NAME}"
            echo "new_code=${NEW_CODE}"
            echo "new_name=${NEW_NAME}"
            echo "tag=v${NEW_NAME}"
          } >> "$GITHUB_OUTPUT"

      # ── Build ──────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release AAB
        run: ./gradlew --no-daemon :app:bundleRelease
        env:
          JELLYFIN_KEYSTORE_FILE:     ${{ runner.temp }}/cinefin-release.keystore
          JELLYFIN_KEYSTORE_PASSWORD: ${{ secrets.JELLYFIN_KEYSTORE_PASSWORD }}
          JELLYFIN_KEY_ALIAS:         ${{ secrets.JELLYFIN_KEY_ALIAS }}
          JELLYFIN_KEY_PASSWORD:      ${{ secrets.JELLYFIN_KEY_PASSWORD }}
          GOOGLE_AI_API_KEY:          ${{ secrets.GOOGLE_AI_API_KEY }}

      # ── Commit + tag + push ────────────────────────────────────
      - name: Commit version bump and push tag
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_name }} (${{ steps.version.outputs.new_code }})"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name:     "Cinefin ${{ steps.version.outputs.new_name }}"
          files:    app/build/outputs/bundle/release/app-release.aab
          draft:    false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Cinefin ${{ steps.version.outputs.new_name }}

            | | |
            |---|---|
            | versionName | `${{ steps.version.outputs.new_name }}` |
            | versionCode | `${{ steps.version.outputs.new_code }}` |

            ### Play Store upload
            Download **`app-release.aab`** from the assets below and upload it in
            [Google Play Console → Releases](https://play.google.com/console) to submit the update.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Completion comment (issue trigger only) ────────────────
      - name: Post completion status to issue
        if: needs.check-trigger.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const releaseUrl = '${{ steps.create_release.outputs.url }}';
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ needs.check-trigger.outputs.issue_number }},
              body: [
                `✅ **Release complete!**`,
                ``,
                `| | |`,
                `|---|---|`,
                `| Version | \`${{ steps.version.outputs.new_name }}\` (code \`${{ steps.version.outputs.new_code }}\`) |`,
                `| Tag | [\`${{ steps.version.outputs.tag }}\`](${releaseUrl}) |`,
                ``,
                `Download the signed \`.aab\` from the release and upload to Google Play Console.`,
              ].join('\n'),
            });
